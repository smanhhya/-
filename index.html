<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سمان ههيا | صحي وطازة</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- الأيقونات ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const ShoppingBag = (p) => <IconWrapper {...p}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></IconWrapper>;
        const Phone = (p) => <IconWrapper {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconWrapper>;
        const Star = (p) => <IconWrapper {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
        const Clock = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconWrapper>;
        const CheckCircle = (p) => <IconWrapper {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
        const ShieldCheck = (p) => <IconWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></IconWrapper>;
        const X = (p) => <IconWrapper {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
        const Plus = (p) => <IconWrapper {...p}><path d="M5 12h14"/><path d="M12 5v14"/></IconWrapper>;
        const Minus = (p) => <IconWrapper {...p}><path d="M5 12h14"/></IconWrapper>;
        const AlertCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconWrapper>;

        // --- البيانات ---
        const initialProducts = [
            { id: 'super', name: 'طبق سوبر', weight: '300-350 جم', price: 100, stock: 50, isBest: true },
            { id: 'jumbo', name: 'طبق جامبو', weight: '350-400 جم', price: 110, stock: 20, isBest: false },
            { id: 'special', name: 'طبق سبشيال', weight: '400-450 جم', price: 120, stock: 5, isBest: true },
            { id: 'superspecial', name: 'سوبر سبشيال', weight: '450-500 جم', price: 130, stock: 0, isBest: false },
            { id: 'eggs', name: 'طبق بيض سمان', weight: '18 بيضة', price: 50, stock: 100, isBest: false },
        ];

        const initialBatch = {
            name: 'دفعة 20 أكتوبر',
            total: 500, booked: 415,
            deliveryDate: '2023-10-20', isOpen: true
        };

        function App() {
            const [view, setView] = useState('store');
            const [products, setProducts] = useState(initialProducts);
            const [currentBatch, setCurrentBatch] = useState(initialBatch);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const BRAND_GREEN = "#184e32"; 
            const GOLD_ACCENT = "#cfa45d";
            const WHATSAPP_NUMBER = "201208027294"; 
            
            // غير الاسم هنا لو اسم اللوجو بتاعك مختلف
            const LOGO_URL = "logo.png"; 

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
            };

            const addToCart = (product) => {
                if (product.stock <= 0) return showToast('عفواً، الكمية نفذت', 'error');
                setCart([...cart, { ...product, quantity: 1 }]);
                showToast('تمت الإضافة للسلة');
            };

            const updateQuantity = (id, delta) => {
                setCart(cart.map(item => {
                    if (item.id === id) {
                        const newQ = item.quantity + delta;
                        if (newQ > 0 && newQ <= item.stock) return { ...item, quantity: newQ };
                        if (newQ === 0) return null; 
                    }
                    return item;
                }).filter(Boolean));
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const cartItemsCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            const renderStoreFront = () => (
                <div className="min-h-screen bg-gray-50 pb-24" dir="rtl">
                    {/* شريط الإشعارات العلوي */}
                    {currentBatch.isOpen && (
                        <div className="bg-[#fef5d4] border-b border-[#f3e1a6] py-2.5 shadow-sm">
                            <div className="container mx-auto px-4 flex justify-between items-center text-sm font-bold text-[#a87c2b]">
                                <div className="flex items-center gap-1.5">
                                    <span className="text-red-500 text-lg">🔥</span>
                                    <span>{currentBatch.name} قربت تخلص!</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span>المتبقي: <span className="text-red-600 font-black">{currentBatch.total - currentBatch.booked}</span> طلب</span>
                                    <span className="hidden md:inline">| تسليم: {currentBatch.deliveryDate}</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* النافبار */}
                    <nav className="bg-white shadow-sm sticky top-0 z-40">
                        <div className="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <img src={LOGO_URL} alt="سمان ههيا" className="h-10 w-10 object-contain" onerror="this.style.display='none'" />
                                <div>
                                    <h1 className="text-xl font-black text-[#184e32]">سمان ههيا</h1>
                                </div>
                            </div>
                            <button onClick={() => setIsCartOpen(true)} className="relative p-2 text-[#184e32] hover:bg-gray-50 rounded-xl transition">
                                <ShoppingBag size={26} />
                                {cartItemsCount > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[11px] min-w-[20px] h-[20px] flex items-center justify-center rounded-full font-black shadow-sm">
                                        {cartItemsCount}
                                    </span>
                                )}
                            </button>
                        </div>
                    </nav>

                    {/* الهيدر الأخضر البريميوم */}
                    <header className="bg-[#184e32] text-white pt-10 pb-16 relative">
                        {/* باترن خفيف في الخلفية */}
                        <div className="absolute inset-0 opacity-5 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                        <div className="max-w-3xl mx-auto px-4 relative z-10 text-center">
                            <h2 className="text-3xl md:text-4xl font-black mb-3">صحي وطازة، من المزرعة لسفرتك</h2>
                            <p className="text-green-100/80 text-sm md:text-base font-semibold max-w-md mx-auto">أعلى جودة وأوزان دقيقة، بتربية بيتي مضمونة لتجربة مميزة لكل العيلة.</p>
                        </div>
                    </header>

                    {/* زرار "اطلب دلوقتي" العائم */}
                    <div className="max-w-3xl mx-auto px-4 flex justify-center -mt-6 relative z-20 mb-10">
                        <a href="#menu" className="bg-white text-[#184e32] px-8 py-3.5 rounded-2xl font-black text-lg shadow-[0_10px_25px_rgba(24,78,50,0.2)] hover:shadow-[0_15px_30px_rgba(24,78,50,0.3)] transition-all transform hover:-translate-y-1 border border-gray-100 flex items-center gap-2">
                            اطلب دلوقتي <ShoppingBag size={20} />
                        </a>
                    </div>

                    {/* المميزات (مربعات خضراء فاتحة) */}
                    <section className="max-w-3xl mx-auto px-4 mb-10">
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 text-center">
                            {[
                                { i: <CheckCircle size={28}/>, t: "أوزان دقيقة", d: "زي ما طلبت بالظبط" },
                                { i: <Star size={28}/>, t: "اسمك عالطلب", d: "استيكر مخصص ليك" },
                                { i: <Clock size={28}/>, t: "تجهيز يومي", d: "طازج مية بالمية" },
                                { i: <ShieldCheck size={28}/>, t: "تغليف آمن", d: "أطباق PET صحية" }
                            ].map((ft, idx) => (
                                <div key={idx} className="p-3 md:p-4 rounded-2xl bg-[#f5fbf7] border border-[#e8f3e8]">
                                    <div className="text-[#cfa45d] flex justify-center mb-2">{ft.i}</div>
                                    <h3 className="font-black text-[#184e32] text-sm md:text-base mb-1">{ft.t}</h3>
                                    <p className="text-[10px] md:text-xs text-gray-500 font-bold">{ft.d}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* المنيو (شكل الكروت القديم اللي عجبك) */}
                    <section id="menu" className="max-w-3xl mx-auto px-4">
                        <h2 className="text-2xl font-black text-[#184e32] mb-6 border-r-4 border-[#cfa45d] pr-3">قائمة الأطباق</h2>
                        
                        <div className="flex flex-col gap-4">
                            {products.map(product => {
                                const inCartQty = cart.find(c => c.id === product.id)?.quantity || 0;
                                return (
                                    <div key={product.id} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-row h-[130px] relative transition-shadow hover:shadow-md">
                                        
                                        {/* الجزء اليمين: تفاصيل المنتج */}
                                        <div className="p-3 flex-1 flex flex-col justify-between bg-white min-w-0">
                                            <div>
                                                <h3 className="text-base md:text-lg font-black text-[#184e32] truncate mb-1">{product.name}</h3>
                                                <div className="flex items-center justify-between gap-2 mb-1">
                                                    <span className="font-black text-[#184e32] text-lg">{product.price} <span className="text-[10px] text-gray-400">ج.م</span></span>
                                                    <span className="bg-[#f5fbf7] text-[#184e32] text-[10px] md:text-xs px-2 py-0.5 rounded border border-[#e8f3e8] font-bold whitespace-nowrap">{product.weight}</span>
                                                </div>
                                            </div>
                                            
                                            <div className="flex items-center justify-between mt-auto">
                                                <div className={`text-[10px] font-bold px-2 py-1 rounded shrink-0 ${product.stock <= 5 ? (product.stock === 0 ? 'bg-red-50 text-red-600' : 'bg-amber-50 text-amber-600') : 'bg-gray-50 text-gray-500'}`}>
                                                    المتاح: {product.stock}
                                                </div>
                                                
                                                <div className="w-28 md:w-32 shrink-0">
                                                    {inCartQty > 0 ? (
                                                        <div className="flex items-center justify-between bg-[#f5fbf7] border border-[#e8f3e8] rounded-xl p-1 h-[36px]">
                                                            <button onClick={() => updateQuantity(product.id, 1)} className="w-8 h-full bg-white text-[#184e32] rounded-lg shadow-sm font-black text-lg flex items-center justify-center">+</button>
                                                            <span className="font-black text-[#184e32] text-sm min-w-[24px] text-center">{inCartQty}</span>
                                                            <button onClick={() => updateQuantity(product.id, -1)} className="w-8 h-full bg-white text-red-500 rounded-lg shadow-sm font-black text-xl flex items-center justify-center pb-1">-</button>
                                                        </div>
                                                    ) : product.stock > 0 ? (
                                                        <button onClick={() => addToCart(product)} className="w-full bg-[#184e32] text-white hover:bg-gray-900 font-black py-1.5 rounded-xl transition-colors shadow-sm text-xs md:text-sm flex justify-center items-center gap-1">
                                                            <Plus size={14} /> إضافة للسلة
                                                        </button>
                                                    ) : (
                                                        <div className="w-full bg-gray-100 text-gray-400 font-bold py-1.5 rounded-xl text-xs text-center border border-gray-200">نفذت الكمية</div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        {/* الجزء الشمال: الصورة والبادج */}
                                        <div className="w-28 md:w-32 shrink-0 relative bg-gray-50 border-r border-gray-100 flex items-center justify-center">
                                            {product.isBest && (
                                                <div className="absolute top-2 right-2 bg-[#cfa45d] text-white text-[9px] font-black px-2 py-1 rounded shadow-sm z-10">الأكثر طلباً 🔥</div>
                                            )}
                                            <img src={LOGO_URL} alt={product.name} className="w-full h-full object-cover opacity-90 p-2" onerror="this.style.display='none'" />
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </section>

                    {/* زرار الواتساب العائم للتواصل */}
                    <a href={`https://wa.me/${WHATSAPP_NUMBER}`} target="_blank" className="fixed bottom-24 right-4 bg-green-500 text-white p-3.5 rounded-full shadow-lg hover:bg-green-600 transition z-30">
                        <Phone size={24} />
                    </a>

                    {/* شريط السلة السفلي الدائم */}
                    <div className={`fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] p-4 flex justify-between items-center z-40 transition-transform duration-300 ${cartItemsCount > 0 ? 'translate-y-0' : 'translate-y-full'}`}>
                        <div className="flex flex-col">
                            <span className="text-[10px] text-gray-500 font-bold">الإجمالي المطلوب</span>
                            <div className="font-black text-[#184e32] text-xl">{cartTotal} <span className="text-xs font-normal">ج.م</span></div>
                        </div>
                        <button onClick={() => setView('checkout')} className="bg-[#184e32] text-white px-8 py-3 rounded-xl font-black shadow-md hover:bg-gray-900 transition flex items-center gap-2">
                            إتمام الحجز <ShoppingBag size={18} />
                        </button>
                    </div>

                    {/* رسائل التنبيه */}
                    {toast.show && (
                        <div className={`fixed top-20 left-1/2 transform -translate-x-1/2 z-[70] px-5 py-2.5 rounded-full shadow-xl font-bold text-white text-sm flex items-center gap-2 transition-all ${toast.type === 'error' ? 'bg-red-500' : 'bg-[#184e32]'}`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );

            const renderCheckoutView = () => {
                const handleOrder = (e) => {
                    e.preventDefault();
                    const form = e.target;
                    let waText = `*طلب جديد من موقع سمان ههيا* 👑\n\n`;
                    waText += `*المنتجات:*\n`;
                    cart.forEach(item => { waText += `▫️ ${item.quantity}x ${item.name}\n`; });
                    waText += `\n*الإجمالي:* ${cartTotal} ج.م (بدون التوصيل)\n`;
                    waText += `\n*بيانات العميل:*\nالاسم: ${form.name.value}\nالرقم: ${form.phone.value}\nالمنطقة: ${form.region.value}\n`;
                    if (form.notes.value) waText += `ملاحظات: ${form.notes.value}`;

                    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waText)}`, '_blank');
                    setCart([]); setView('store');
                };

                return (
                    <div className="min-h-screen bg-gray-50 py-8 font-sans" dir="rtl">
                        <div className="max-w-xl mx-auto px-4">
                            <button onClick={() => setView('store')} className="text-gray-500 mb-6 flex items-center gap-2 hover:text-[#184e32] font-bold text-sm bg-white px-4 py-2 rounded-xl border shadow-sm">
                                <X size={16} /> الرجوع للمنيو
                            </button>

                            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 md:p-6">
                                <h2 className="text-xl font-black text-[#184e32] mb-5 border-b pb-4 flex items-center gap-2"><ShoppingBag size={20}/> تأكيد الحجز</h2>
                                
                                <form onSubmit={handleOrder} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1.5">الاسم الكريم (للاستيكر)</label>
                                        <input name="name" required type="text" className="w-full border-2 border-gray-100 bg-gray-50 rounded-xl p-3 focus:border-[#cfa45d] focus:bg-white outline-none font-bold text-[#184e32] transition" placeholder="الاسم ثلاثي" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1.5">رقم الموبايل</label>
                                            <input name="phone" required type="tel" className="w-full border-2 border-gray-100 bg-gray-50 rounded-xl p-3 focus:border-[#cfa45d] focus:bg-white outline-none font-bold text-[#184e32] transition text-left tracking-wider" placeholder="01X..." dir="ltr" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1.5">منطقة التوصيل</label>
                                            <input name="region" required type="text" className="w-full border-2 border-gray-100 bg-gray-50 rounded-xl p-3 focus:border-[#cfa45d] focus:bg-white outline-none font-bold text-[#184e32] transition" placeholder="الزقازيق، ههيا..." />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1.5">ملاحظات (اختياري)</label>
                                        <textarea name="notes" className="w-full border-2 border-gray-100 bg-gray-50 rounded-xl p-3 focus:border-[#cfa45d] focus:bg-white outline-none font-bold text-[#184e32] transition h-20" placeholder="عايزه متنضف بطريقة معينة..."></textarea>
                                    </div>

                                    <div className="bg-[#f5fbf7] p-4 rounded-xl mt-6 border border-[#e8f3e8]">
                                        <div className="flex justify-between items-center text-lg font-black text-[#184e32]">
                                            <span>الإجمالي المطلوب:</span>
                                            <span>{cartTotal} <span className="text-sm">ج.م</span></span>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-green-500 text-white py-4 rounded-xl font-black text-lg hover:bg-green-600 shadow-md transition flex items-center justify-center gap-2 mt-4">
                                        <Phone size={20} /> تأكيد وإرسال واتساب
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            };

            return view === 'checkout' ? renderCheckoutView() : renderStoreFront();
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
